<!DOCTYPE html>
<html>
  <head>
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-call-function/dist/index.browser.js"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-audio-keyboard-response@2.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-audio-button-response@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
    <script src="utils.js"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css">
  </head>
  <body>
  </body>
  <script>
    var jsPsych = initJsPsych({
      use_webaudio: false
    });
   
    var timeline = [];
    
    const subject_id = jsPsych.randomization.randomID(10);
    const filename = `${subject_id}.csv`;

    const save_data = {
      type: jsPsychPipe,
      action: "save",
      experiment_id: "4zJU81B9kIri",
      filename: filename,
      data_string: function() {
        return jsPsych.data
          .get()
          .filter({ task: 'sdt-trial' })
          .ignore('trial_type')
          .ignore('trial_index')
          .csv();
      }
    };
              
    var preload = {
      type: jsPsychPreload,
      audio: ['sdtdemo/Nddd___.wav', 
              'sdtdemo/NdddS10.wav',
              'sdtdemo/NdddS20.wav',
              'sdtdemo/NdddS30.wav',
              'sdtdemo/NdddS40.wav',
              'sdtdemo/NdddS50.wav',
              'sdtdemo/NdddS60.wav',
              'sdtdemo/NdddS70.wav',
              'sdtdemo/NdddS80.wav',
              'sdtdemo/NdddS90.wav',
              'sdtdemo/NdddS100.wav',]
    };
    timeline.unshift(preload);

    let selected_level = 50; // default
    
    var select_level = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <p>Herzlich Willkommen zu unserem spannenden Signalentdeckungsexperiment!</p>
        <p>Bitte wählen Sie einen Signalpegel zwischen 10 und 100:</p>
        <input type="range" id="level-slider" min="10" max="100" step="10" value="50"
               style="width:400px;">
        <p>Gewählter Pegel: <span id="level-display">50</span></p>
      `,
      choices: ['Weiter'],
      on_load: function() {
        const slider = document.getElementById('level-slider');
        const display = document.getElementById('level-display');
        slider.addEventListener('input', function() {
          display.textContent = slider.value;
          selected_level = parseInt(slider.value);  // ← update here, not in on_finish
        });
      },
      on_finish: function(data) {
        data.selected_level = selected_level;  // just save to data, don't read DOM
      }
    };
    timeline.push(select_level);

     var practice = {
      type: jsPsychHtmlKeyboardResponse,
      choices: "NO_KEYS",
      stimulus: `
        <p>Machen Sie sich mit den Sounds vertraut, bevor die Aufgabe beginnt.</p>
        <p>Ihre Aufgabe ist es, Rauschen mit einem Gitarrenakkord (Signal!) nach den drei Drumschlägen</p>
        <p>von alleinigem Rauschen mit drei Drumschlägen zu unterscheiden.</p>
        <br>
        <button onclick="new Audio('sdtdemo/Nddd___.wav').play(); return false;"
                style="padding:10px 20px; margin:10px; font-size:16px;">
          🔊 Nur Rauschen
        </button>
        <button onclick="new Audio('sdtdemo/NdddS' + selected_level + '.wav').play(); return false;"
                style="padding:10px 20px; margin:10px; font-size:16px;">
          🔊 Rauschen + Signal
        </button>
        <br><br>
        <p style="color:gray; font-size:14px;">
          Sie können die Klänge so oft abspielen, wie Sie möchten.<br>
          Wenn Sie bereit sind, klicken Sie auf "Aufgabe starten".
        </p>
        <br>
        <button onclick="jsPsych.finishTrial(); return false;"
                style="padding:12px 30px; font-size:18px; cursor:pointer;">
          Aufgabe starten
        </button>
      `
    };
    timeline.push(practice);

    var instruction = {
      type: jsPsychInstructions,
      pages: [
        '<p>Wir werden gleich 36 Durchgänge durchlaufen.</p><p>Bitte geben Sie jeweils an, ob Sie das Signal (Gitarrenakkord) im Hintergrundrauschen hören oder nicht.</p>',
        '<p>Aufgabe verstanden? Sind Sie bereit?</p>'
        ],
      show_clickable_nav: true,
      button_label_next: "Weiter",
      button_label_previous: "Zurück",
    }
    timeline.push(instruction);
    
    
    var fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="font-size:60px;">!</div>',
      choices: "NO_KEYS",
      trial_duration: 1000
    };
    
    let trialCounter = 0;
    const totalTrials = 36;

    var play_audio = {
        type: jsPsychAudioKeyboardResponse,
        stimulus: jsPsych.timelineVariable('sound'),
        choices: ["j","n"],
        prompt: function() {
          const sound = jsPsych.evaluateTimelineVariable('sound');
          return `
            <p>Hören Sie das Signal (J) oder nicht (N)?</p>
            <p style="color:gray; font-size:14px;">Durchgang ${trialCounter + 1} von ${totalTrials}</p>
          `;
        },
        trial_ends_after_audio: false,
        on_finish: function(data) {
          trialCounter++;
          data.trial_number = trialCounter;
          data.stimulus = jsPsych.evaluateTimelineVariable('sound');
          data.correct_answer = jsPsych.evaluateTimelineVariable('corrAns')[0];
          data.correct = data.response === jsPsych.evaluateTimelineVariable('corrAns')[0];
          data.task = 'sdt-trial';
          console.log(data); 
        }
    };
    
    var test_procedure = {
      on_start: function() {
        console.log('selected_level at test start:', selected_level);
        test_procedure.timeline_variables = [
          { sound: `sdtdemo/NdddS${selected_level}.wav`, corrAns: ['j'] },
          { sound: 'sdtdemo/Nddd___.wav', corrAns: ['n'] }
        ];
      },
      timeline: [fixation, play_audio],
      timeline_variables: [
        { sound: 'sdtdemo/NdddS50.wav', corrAns: ['j'] },
        { sound: 'sdtdemo/Nddd___.wav', corrAns: ['n'] }
      ],
      randomize_order: true,
      repetitions: 18
    };
    timeline.push(test_procedure);


    var sdt_feedback = {
      type: jsPsychHtmlButtonResponse,
      stimulus: function() {
    
        // Get all SDT trials
        const trials = jsPsych.data.get().filter({ task: 'sdt-trial' }).values();
    
        // Separate signal and noise trials
        const signal_trials = trials.filter(t => t.correct_answer === 'j');
        const noise_trials  = trials.filter(t => t.correct_answer === 'n');
    
        // Count hits and false alarms
        let hits = signal_trials.filter(t => t.response === 'j').length;
        let fas  = noise_trials.filter(t => t.response === 'j').length;
    
        const n_signal = signal_trials.length;
        const n_noise  = noise_trials.length;
    
        // Apply log-linear correction to avoid 0 and 1 (Hautus, 1995)
        const hit_rate = (hits + 0.5) / (n_signal + 1);
        const fa_rate  = (fas  + 0.5) / (n_noise  + 1);
    
        // Convert to z-scores using inverse normal CDF
        function inv_norm(p) {
          // Rational approximation (Abramowitz & Stegun)
          const a = [0, -3.969683028665376e+01,  2.209460984245205e+02,
                       -2.759285104469687e+02,  1.383577518672690e+02,
                       -3.066479806614716e+01,  2.506628277459239e+00];
          const b = [0, -5.447609879822406e+01,  1.615858368580409e+02,
                       -1.556989798598866e+02,  6.680131188771972e+01,
                       -1.328068155288572e+01];
          const c_ = [-7.784894002430293e-03, -3.223964580411365e-01,
                       -2.400758277161838e+00, -2.549732539343734e+00,
                        4.374664141464968e+00,  2.938163982698783e+00];
          const d_ = [ 7.784695709041462e-03,  3.224671290700398e-01,
                        2.445134137142996e+00,  3.754408661907416e+00];
          const p_low  = 0.02425;
          const p_high = 1 - p_low;
          let q, r;
          if (p < p_low) {
            q = Math.sqrt(-2 * Math.log(p));
            return (((((c_[0]*q+c_[1])*q+c_[2])*q+c_[3])*q+c_[4])*q+c_[5]) /
                   ((((d_[0]*q+d_[1])*q+d_[2])*q+d_[3])*q+1);
          } else if (p <= p_high) {
            q = p - 0.5;
            r = q * q;
            return (((((a[1]*r+a[2])*r+a[3])*r+a[4])*r+a[5])*r+a[6])*q /
                   (((((b[1]*r+b[2])*r+b[3])*r+b[4])*r+b[5])*r+1);
          } else {
            q = Math.sqrt(-2 * Math.log(1 - p));
            return -(((((c_[0]*q+c_[1])*q+c_[2])*q+c_[3])*q+c_[4])*q+c_[5]) /
                    ((((d_[0]*q+d_[1])*q+d_[2])*q+d_[3])*q+1);
          }
        }
    
        const z_hit = inv_norm(hit_rate);
        const z_fa  = inv_norm(fa_rate);
    
        const d_prime = z_hit - z_fa;
        const c       = -0.5 * (z_hit + z_fa);
    
        // Save to data
        jsPsych.data.addProperties({
          d_prime: d_prime.toFixed(3),
          c: c.toFixed(3),
          hit_rate: hit_rate.toFixed(3),
          fa_rate: fa_rate.toFixed(3)
        });
    
        return `
          <h2>Ergebnisse</h2>
          <table style="font-size:20px; border-collapse:collapse; margin:auto;">
            <tr><td style="padding:8px 20px;">Treffer (Hit Rate):</td>
                <td><b>${(hit_rate * 100).toFixed(1)} %</b></td></tr>
            <tr><td style="padding:8px 20px;">Fehlalarm (False Alarm Rate):</td>
                <td><b>${(fa_rate * 100).toFixed(1)} %</b></td></tr>
            <tr><td style="padding:8px 20px;">Sensitivität (d'):</td>
                <td><b>${d_prime.toFixed(2)}</b></td></tr>
            <tr><td style="padding:8px 20px;">Antwortkriterium (c):</td>
                <td><b>${c.toFixed(2)}</b></td></tr>
          </table>
          <br>
          <p style="color:gray; font-size:14px;">
            d' > 0: Signal erkannt &nbsp;|&nbsp; c < 0: liberales Kriterium &nbsp;|&nbsp; c > 0: konservatives Kriterium
          </p>
        `;
      },
      choices: ['Beenden']
    };
    
    timeline.push(sdt_feedback);
    timeline.push(save_data);
    
    jsPsych.run(timeline)
    
  </script>
</html>
